[[customizations.filesystem]]
mountpoint = "/"
minsize = "20 GiB"
type = "xfs"

[[customizations.filesystem]]
mountpoint = "/boot"
minsize = "1 GiB"
type = "ext4"

[customizations.installer.kickstart]
contents = """
%post
bootc switch --mutate-in-place --transport registry ghcr.io/tristanbollard/tblue-bazzite:latest
%end

%post --nochroot --log=/tmp/anacoda_custom_logs/secureboot-enroll-key.log
set -euxo pipefail

ENROLLMENT_PASSWORD="universalblue"
sysroot=""
for candidate in /mnt/sysroot /mnt/sysimage; do
  if [ -d "$candidate/usr" ]; then
    sysroot="$candidate"
    break
  fi
done

if [ -z "$sysroot" ]; then
  echo "No install sysroot found; skipping secure boot setup."
  exit 0
fi

build_commit="$(awk -F= '/^TBLUE_GIT_COMMIT=/{gsub(/"/,"",$2);print $2}' "$sysroot/usr/lib/os-release" 2>/dev/null | head -n1 || true)"
if [ -n "$build_commit" ]; then
  echo "Installer payload commit: $build_commit"
  echo "TBlue Installer payload commit: $build_commit" > /etc/system-release
fi

if [ ! -d /sys/firmware/efi ]; then
  echo "EFI mode not detected. Skipping key enrollment."
  exit 0
fi

sys_id="$(cat /sys/devices/virtual/dmi/id/product_name 2>/dev/null || true)"
case ":$sys_id:" in
  *":Jupiter:"*|*":Galileo:"*)
    echo "Steam Deck hardware detected. Skipping key enrollment."
    exit 0
    ;;
esac

key_path=""
if [ -f "$sysroot/usr/share/tblue-secureboot/secureboot.der" ]; then
  key_path="$sysroot/usr/share/tblue-secureboot/secureboot.der"
elif command -v openssl >/dev/null 2>&1; then
  for pem_source in "$sysroot/usr/share/tblue-secureboot/secureboot.pem" "$sysroot/usr/share/tblue-secureboot/secureboot.crt"; do
    if [ -f "$pem_source" ]; then
      mkdir -p /tmp/tblue-secureboot
      generated_key="/tmp/tblue-secureboot/secureboot.der"
      if openssl x509 -in "$pem_source" -outform DER -out "$generated_key" >/dev/null 2>&1; then
        key_path="$generated_key"
        break
      fi
    fi
  done
fi

if [ -z "$key_path" ]; then
  echo "No usable secure boot key found in installed system; skipping enrollment."
  exit 0
fi

mokutil --timeout -1 || true
if mokutil --test-key "$key_path" >/dev/null 2>&1; then
  echo "Secure Boot key already enrolled."
else
  printf '%s\n%s\n' "$ENROLLMENT_PASSWORD" "$ENROLLMENT_PASSWORD" | mokutil --import "$key_path" || true
fi

esp_root=""
for candidate in "$sysroot/boot/efi" "$sysroot/efi" "$sysroot/boot"; do
  if [ -d "$candidate/EFI" ]; then
    esp_root="$candidate"
    break
  fi
  if findmnt -n --target "$candidate" >/dev/null 2>&1; then
    esp_root="$candidate"
    break
  fi
done

if [ -n "$esp_root" ]; then
  mkdir -p "$esp_root/EFI/BOOT" "$esp_root/EFI/fedora"

  shim_src_rel="$(rpm --root "$sysroot" -ql shim-x64 2>/dev/null | grep -E '/shimx64\.efi$' | head -n1 || true)"
  shim_vendor_src_rel="$(rpm --root "$sysroot" -ql shim-x64 2>/dev/null | grep -E '/shim\.efi$' | head -n1 || true)"
  fbx_src_rel="$(rpm --root "$sysroot" -ql shim-x64 2>/dev/null | grep -E '/fbx64\.efi$' | head -n1 || true)"

  if [ -n "$shim_src_rel" ] && [ -f "$sysroot$shim_src_rel" ]; then
    cp -f "$sysroot$shim_src_rel" "$esp_root/EFI/BOOT/BOOTX64.EFI"
    cp -f "$sysroot$shim_src_rel" "$esp_root/EFI/fedora/shimx64.efi"
  fi
  if [ -n "$fbx_src_rel" ] && [ -f "$sysroot$fbx_src_rel" ]; then
    cp -f "$sysroot$fbx_src_rel" "$esp_root/EFI/BOOT/fbx64.efi"
  fi
  if [ -n "$shim_vendor_src_rel" ] && [ -f "$sysroot$shim_vendor_src_rel" ]; then
    cp -f "$sysroot$shim_vendor_src_rel" "$esp_root/EFI/fedora/shim.efi"
  fi
fi
%end
"""

[customizations.installer.modules]
enable = [
  "org.fedoraproject.Anaconda.Modules.Storage",
  "org.fedoraproject.Anaconda.Modules.Runtime",
  "org.fedoraproject.Anaconda.Modules.Security",
  "org.fedoraproject.Anaconda.Modules.Users"
]
disable = [
  "org.fedoraproject.Anaconda.Modules.Network",
  "org.fedoraproject.Anaconda.Modules.Services",
  "org.fedoraproject.Anaconda.Modules.Subscription",
  "org.fedoraproject.Anaconda.Modules.Timezone"
]
