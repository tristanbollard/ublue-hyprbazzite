exec-once = hypridle
exec-once = swaync
# exec-once = dunst (Using SwayNotificationCenter instead)
exec-once = waybar --config /etc/waybar/config --style /etc/waybar/style.css
exec-once = fcitx5
exec-once = swww-daemon & wallpaper-cycle &
exec-once = bash /etc/hypr/scripts/hypr-dnd-auto.sh &
exec-once = /usr/libexec/lxqt-policykit-agent
exec-once = wl-paste --watch cliphist store
exec-once = gnome-keyring-daemon --start --components=pkcs11,secrets,ssh,gpg

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment DISPLAY WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = sh -c 'pgrep -x nm-applet >/dev/null || nm-applet --indicator'
exec-once = blueman-applet

exec-once = cursor-clip --daemon
exec-once = /etc/hypr/scripts/wvkbd-auto.sh
exec-once = flatpak run com.bitwarden.desktop &
exec-once = sh -c '[ -d /sys/bus/iio/devices ] && exec iio-hyprland'
exec-once = sh -c '[ -d /sys/module/asus_nb_wmi ] && exec rog-control-center'