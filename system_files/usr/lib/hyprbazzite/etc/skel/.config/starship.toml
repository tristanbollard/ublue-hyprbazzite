format = """
[вЦСвЦТвЦУ](#a3aed2)\
[ пМК ](bg:#a3aed2 fg:#090c0c)\
[оВі](bg:#769ff0 fg:#a3aed2)\
$directory\
[оВі](bg:#394260 fg:#769ff0)\
$git_branch\
$git_status\
[оВі](bg:#212736 fg:#394260)\
$nodejs\
$rust\
$golang\
$php\
[оВі](bg:#1d2230 fg:#212736)\
$time\
[оВі ](fg:#1d2230)\
\n$character"""

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вА¶/"

[directory.substitutions]
"Documents" = "у∞ИЩ "
"Downloads" = "пАЩ "
"Music" = "пАБ "
"Pictures" = "пАЊ "

[git_branch]
symbol = "пРШ"
style = "bg:#394260"
format = "[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)"

[git_status]
style = "bg:#394260"
format = "[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)"

[nodejs]
symbol = "оЬШ"
style = "bg:#212736"
format = "[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)"

[rust]
symbol = "оЮ®"
style = "bg:#212736"
format = "[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)"

[golang]
symbol = "оШІ"
style = "bg:#212736"
format = "[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)"

[php]
symbol = "пАЗ"
style = "bg:#212736"
format = "[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)"

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#1d2230"
format = "[[ пРЇ $time ](fg:#a0a9cb bg:#1d2230)]($style)"
